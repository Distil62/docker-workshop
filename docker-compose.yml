version: '3.1'
services: 
  mongo:
    image: mongo
    container_name: $DB_HOSTNAME
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: $MONGO_PWD
    volumes:
      - $MONGO_VOLUME:/data/db
    networks:
      - back 
  app:
    image: distil62/docker_bookap:0.0.1
    container_name: app
    environment:
      DB_HOSTNAME: $DB_HOSTNAME
    networks: 
     - back

networks: 
  back:
